<style>
* { box-sizing: border-box; }

body {
  margin: 0;

  color: white;
  background:

  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,215,120,0.16) 1px, transparent 1px);
  background-size: 38px 38px;
  opacity: 0.35;
  animation: drift 28s linear infinite;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: "龍";
  position: fixed;
  right: -30px;
  bottom: -70px;
  font-size: 230px;
  color: rgba(255,215,120,0.05);
  pointer-events: none;
  z-index: 0;
}

@keyframes drift {
  from { transform: translateX(0); }
  to { transform: translateX(-180px); }
}

.screen {
  display: none;
  padding: 28px 18px;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

.active {
  display: block;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

h1 {
  font-size: 44px;
  margin-top: 80px;
  letter-spacing: 4px;
  color: #ffe7a3;
  text-shadow: 0 0 18px rgba(255,215,120,0.35);
}

h2 { letter-spacing: 3px; }

p { line-height: 1.8; }

button {
  width: 85%;
  max-width: 440px;
  padding: 15px 18px;
  margin: 10px auto;
  border-radius: 999px;
  border: 1px solid rgba(255,230,160,0.45);
  font-size: 17px;
  font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
  cursor: pointer;
  color: #2b1606;
  background: linear-gradient(135deg, #fff3c4, #d6a546);
  box-shadow: 0 7px 18px rgba(0,0,0,0.38);
  transition: 0.2s;
  letter-spacing: 1px;
  display: block;
}

button:hover {
  transform: scale(1.035);
  filter: brightness(1.08);
}

button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none;
}

.secondary-btn {
  background: linear-gradient(135deg, #eeeeee, #999999);
}

.card {

}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }

}

.jade {
  background:

}

}

.ink {

}

.small {

#timer {

  color: #ffe7a3;
}

#options {
  position: relative;
  z-index: 10;

#feedback {

  width: 90%;
  max-width: 680px;
  border-radius: 16px;
  background: rgba(255,255,255,0.13);
  border: 1px solid rgba(255,255,255,0.16);
  display: none;
  line-height: 1.7;
  position: relative;
  z-index: 10;

  max-width: 560px;
  margin: 18px auto;
  text-align: left;

.bar-bg {

.bar {

</style>

<body>

<div id="home" class="screen active">
  <h1>🐉 龍紋偵探社</h1>
  <p>穿越三個展區，觀察每件展品中的龍紋造型、姿態與紋飾細節，找出隱藏在作品中的時代特色與文化意義。</p>
  <p class="note">請在不同展區中完成屬於你的「龍紋調查任務」！</p>
  <button onclick="startGame()">開始調查</button>
</div>

<div id="select" class="screen">
  <h2>選擇展區</h2>
  <p>每個展區有五件作品。請依序仔細觀察後回答問題。</p>
  <p class="note">每個問題限時15秒</p>

  <button onclick="startStage('jade')">🟢 玉中之龍</button>
  <button onclick="startStage('vessel')">🟡 瓷器之龍</button>
  <button onclick="startStage('ink')">🟣 筆墨之龍</button>

  <div class="bar-wrap">
    <div class="bar-title">玉中之龍</div>
    <div class="bar-bg"><div id="jadeBar" class="bar"></div></div>

    <div class="bar-title">瓷器之龍</div>
    <div class="bar-bg"><div id="vesselBar" class="bar"></div></div>

    <div class="bar-title">筆墨之龍</div>
    <div class="bar-bg"><div id="inkBar" class="bar"></div></div>
  </div>

  <button class="secondary-btn" onclick="finish()">結算結果</button>
</div>

<div id="game" class="screen">
  <div id="card" class="card">
    <div class="badge" id="stageName"></div>

    <div class="art-label">
      <div id="artTitle"></div>
      <div id="artInfo"></div>
    </div>

    <img id="artImg" src="" onclick="zoomImage()">

    <h2 id="question"></h2>
    <p id="desc" class="small"></p>
  </div>

  <div id="timer"></div>
  <div id="options"></div>
  <div id="feedback"></div>
</div>

<div id="result" class="screen">

    <h2>🔍 偵探結論</h2>
    <div id="finalTitle"></div>
    <img id="finalImg" src="">
    <p id="finalText"></p>
    <button onclick="location.reload()">再玩一次</button>
  </div>
</div>

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startGame() {
  show("select");
}

function startStage(s) {
  stage = s;
  index = 0;
  show("game");
  loadQuestion();
}

function loadQuestion() {
  clearInterval(timer);
  answered = false;

  let q = data[stage][index];

  document.getElementById("card").className = "card " + stage;
  document.getElementById("stageName").innerText =
    stageText[stage] + "｜第 " + (index + 1) + " 件作品";

  document.getElementById("artTitle").innerText = q.title;
  document.getElementById("artInfo").innerText =
    q.era + "｜" + q.material + "｜" + q.museum;

  document.getElementById("question").innerText = q.q;
  document.getElementById("desc").innerText = q.d;

  let img = document.getElementById("artImg");
  if (q.img) {
    img.src = q.img;
    img.style.display = "block";
  } else {
    img.style.display = "none";
  }

  let optBox = document.getElementById("options");
  optBox.innerHTML = "";

  q.options.forEach((opt, i) => {
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => answer(i);
    optBox.appendChild(btn);
  });

  let feedback = document.getElementById("feedback");
  feedback.style.display = "none";
  feedback.innerText = "";

  startTimer();
}

function startTimer() {
  timeLeft = 15;
  document.getElementById("timer").innerText = "⏳ 倒數 " + timeLeft + " 秒";

  clearInterval(timer);

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "⏳ 倒數 " + timeLeft + " 秒";

    if (timeLeft <= 0) {
      clearInterval(timer);
      answer(-1);
    }
  }, 1000);
}

function answer(i) {
  if (answered) return;
  answered = true;

  clearInterval(timer);

  let q = data[stage][index];
  let feedback = document.getElementById("feedback");

  if (i === q.answer) {
    score[stage]++;
    feedback.innerText = "✅ 答對了！" + q.explain;
  } else if (i === -1) {
    feedback.innerText = "⏰ 時間到！" + q.explain;
  } else {
    feedback.innerText = "❌ 答錯了！" + q.explain;
  }

  feedback.style.display = "block";
  updateBar();

  let buttons = document.querySelectorAll("#options button");
  buttons.forEach(btn => btn.disabled = true);

  let nextBtn = document.createElement("button");
  nextBtn.innerText = "下一題";
  nextBtn.onclick = nextQuestion;
  document.getElementById("options").appendChild(nextBtn);
}

function nextQuestion() {
  index++;

  if (index >= data[stage].length) {
    show("select");
  } else {
    loadQuestion();
  }
}

function updateBar() {
  document.getElementById("jadeBar").style.width = score.jade * 20 + "%";
  document.getElementById("vesselBar").style.width = score.vessel * 20 + "%";
  document.getElementById("inkBar").style.width = score.ink * 20 + "%";
}

function generateDragon() {
  let j = score.jade;
  let v = score.vessel;
  let i = score.ink;

  if (j === 5 && v === 5 && i === 5) {
    return {
      title: "太初祖龍",
      text:
        "✨ 隱藏結局解鎖 ✨\n\n" +
        "你解讀了龍的全部形態。\n\n" +
        "從玉龍，到瓷器之龍，再到游走於筆墨中的龍，" +
        "你已看見龍紋跨越時代的真正樣貌，真正讀懂了龍文化的核心。\n\n" +
        "你是——真正理解龍的人。",
      img: "images/dragon-pattern.png"
    };
  }

  if (j === v && v === i) {
    return {
      title: "三相真龍",
      text:
        "你的龍的理解十分平均。\n\n" +
        "你同時看見了龍的三種面貌：玉器、瓷器，以及筆墨。" +
        "你能從不同角度理解龍的意義，是少數擁有完整視野的觀察者。",
      img: "images/final-three.png"
    };
  }

  if (j === v && j > i) {
    return {
      title: "天工御龍",
      text:
        "你同時掌握了【玉中之龍】與【瓷器之龍】。\n\n" +
        "你對工藝與文明秩序有敏銳的觀察力，看見了龍紋中的技藝與威儀。" +
        "",
      img: "images/final-jade-vessel.png"
    };
  }

  if (j === i && j > v) {
    return {
      title: "玉墨靈龍",
      text:
        "你同時掌握了【玉中之龍】與【筆墨之龍】。\n\n" +
        "你特別能理解龍紋中的精神性與情感流動，具有細膩而深刻的藝術直覺。" +
        "",
      img: "images/final-jade-ink.png"
    };
  }

  if (v === i && v > j) {
    return {
      title: "青墨游龍",
      text:
        "你同時掌握了【瓷器之龍】與【筆墨之龍】。\n\n" +
        "你能同時感受瓷器的華美與筆墨的氣韻，擁有獨特的藝術感知力。" +
        "",
      img: "images/final-vessel-ink.png"
    };
  }

  if (j > v && j > i) {
    return {
      title: "蒼玉天龍",
      text:
        "你掌握了【玉中之龍】。" +
        "你善於發現龍最古老而神聖的面貌，對文化起源有敏銳感受。",
      img: "images/final-jade.png"
    };
  }

  if (v > j && v > i) {
    return {
      title: "青華御龍",
      text:
        "你掌握了【瓷器之龍】。" +
        "你對紋飾、工藝與器物之美有極高敏銳度，能看見細節中的華麗巧思。",
      img: "images/final-vessel.png"
    };
  }

  return {
    title: "墨雲游龍",
    text:
      "你掌握了【筆墨之龍】。" +
      "你擅長感受筆墨中的氣韻與生命力，擁有自由而富有想像力的觀察方式。",
    img: "images/final-ink.png"
  };
}

function finish() {
  clearInterval(timer);
  show("result");

  let total = score.jade + score.vessel + score.ink;
  let result = generateDragon();

  document.getElementById("finalTitle").innerText = result.title;

  let finalImg = document.getElementById("finalImg");
  finalImg.src = result.img;
  finalImg.style.display = "block";

  document.getElementById("finalText").innerText =
    "總分：" + total + " / 15" +
    "\n玉中之龍：" + score.jade + " / 5" +
    "\n器物之龍：" + score.vessel + " / 5" +
    "\n筆墨之龍：" + score.ink + " / 5" +
    "\n\n" + result.text;
}

function zoomImage() {
  let img = document.getElementById("artImg");
  if (img.requestFullscreen) {
    img.requestFullscreen();
  }
}
</script>
