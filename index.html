<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>龍之形：中國藝術名品策展</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070707;
      --bg-2: #101010;
      --gold: #d8b46a;
      --gold-light: #f6ddb0;
      --jade: #9dd7bd;
      --porcelain: #d8e8ff;
      --ink: #d9d4c8;
      --text: #f7f0e2;
      --muted: #b8ad9c;
      --card: rgba(255, 255, 255, 0.075);
      --card-strong: rgba(255, 255, 255, 0.12);
      --line: rgba(255, 255, 255, 0.14);
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Noto Serif TC", "Microsoft JhengHei", "PingFang TC", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(216, 180, 106, 0.16), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(130, 220, 190, 0.1), transparent 25%),
        radial-gradient(circle at 50% 90%, rgba(120, 150, 255, 0.08), transparent 32%),
        linear-gradient(135deg, #040404, #111, #050505);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 70px 70px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      opacity: 0.45;
      z-index: -2;
    }

    body::after {
      content: "龍";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: min(42vw, 620px);
      line-height: 1;
      color: rgba(216, 180, 106, 0.035);
      pointer-events: none;
      z-index: -1;
      font-weight: 900;
      letter-spacing: -0.08em;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    .page {
      display: none;
      min-height: 100vh;
      animation: fadeIn 0.55s ease both;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      width: min(1160px, calc(100% - 40px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(18px);
      background: rgba(5, 5, 5, 0.72);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      width: min(1160px, calc(100% - 40px));
      margin: 0 auto;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(216, 180, 106, 0.55);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold-light);
      background: radial-gradient(circle, rgba(216,180,106,.24), rgba(255,255,255,.03));
      box-shadow: 0 0 28px rgba(216,180,106,.15);
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav button,
    .ghost-btn,
    .primary-btn {
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--text);
      background: rgba(255,255,255,0.06);
      padding: 10px 15px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .nav button:hover,
    .ghost-btn:hover,
    .primary-btn:hover {
      border-color: rgba(216,180,106,.6);
      transform: translateY(-2px);
      background: rgba(216,180,106,.12);
    }

    .primary-btn {
      background: linear-gradient(135deg, rgba(216,180,106,.95), rgba(127,88,32,.95));
      color: #120e08;
      font-weight: 800;
      border: none;
      box-shadow: 0 14px 40px rgba(216,180,106,.18);
    }

    .hero {
      position: relative;
      min-height: calc(100vh - 72px);
      display: grid;
      align-items: center;
      padding: 72px 0 64px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 42px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold-light);
      letter-spacing: 0.18em;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .spark {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 20px var(--gold);
    }

    h1 {
      font-size: clamp(48px, 8vw, 108px);
      line-height: 0.95;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      text-shadow: 0 12px 45px rgba(0,0,0,.55);
    }

    .hero-title span {
      display: block;
      background: linear-gradient(135deg, #fff7dc, #d8b46a 48%, #8e6a2c);
      -webkit-background-clip: text;
      color: transparent;
    }

    .lead {
      color: var(--muted);
      font-size: 18px;
      line-height: 2;
      max-width: 660px;
      margin-bottom: 30px;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .dragon-panel {
      position: relative;
      min-height: 520px;
      border: 1px solid rgba(216,180,106,.28);
      border-radius: 36px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.035)),
        radial-gradient(circle at 30% 20%, rgba(216,180,106,.18), transparent 30%);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .dragon-panel::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(216,180,106,.25);
      border-radius: 28px;
    }

    .dragon-line {
      position: absolute;
      width: 78%;
      height: 78%;
      left: 11%;
      top: 11%;
      border-radius: 50%;
      border: 2px solid rgba(216,180,106,.38);
      filter: drop-shadow(0 0 18px rgba(216,180,106,.18));
      animation: float 6s ease-in-out infinite;
    }

    .dragon-line::before,
    .dragon-line::after {
      content: "";
      position: absolute;
      border: 2px solid rgba(246,221,176,.5);
      border-radius: 50%;
    }

    .dragon-line::before {
      width: 78%;
      height: 36%;
      left: 7%;
      top: 30%;
      transform: rotate(-22deg);
      border-left-color: transparent;
      border-bottom-color: transparent;
    }

    .dragon-line::after {
      width: 34%;
      height: 34%;
      right: -4%;
      top: 12%;
      box-shadow:
        -26px 28px 0 -20px rgba(216,180,106,.7),
        -54px 54px 0 -26px rgba(216,180,106,.45);
    }

    .dragon-word {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: clamp(100px, 18vw, 230px);
      font-weight: 900;
      color: rgba(255,247,220,.3);
      letter-spacing: -0.12em;
    }

    .seal {
      position: absolute;
      right: 34px;
      bottom: 34px;
      width: 76px;
      height: 76px;
      border: 2px solid rgba(216, 60, 40, 0.65);
      color: rgba(255, 110, 92, 0.85);
      display: grid;
      place-items: center;
      font-size: 22px;
      writing-mode: vertical-rl;
      letter-spacing: 0.1em;
      background: rgba(90, 10, 7, 0.14);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-14px) rotate(2deg); }
    }

    .section {
      padding: 78px 0;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }

    .section-title {
      font-size: clamp(30px, 4vw, 54px);
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }

    .section-note {
      color: var(--muted);
      line-height: 1.8;
      max-width: 720px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .theme-card,
    .work-card,
    .info-card {
      border: 1px solid var(--line);
      background: var(--card);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(0,0,0,.28);
    }

    .theme-card {
      min-height: 390px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: 0.28s ease;
      position: relative;
    }

    .theme-card:hover {
      transform: translateY(-8px);
      border-color: rgba(216,180,106,.55);
      background: var(--card-strong);
    }

    .theme-visual {
      min-height: 190px;
      position: relative;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,.24), transparent 10%),
        linear-gradient(145deg, rgba(216,180,106,.2), rgba(255,255,255,.035));
      overflow: hidden;
    }

    .theme-visual::before {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      border: 1px solid rgba(246,221,176,.35);
      border-radius: 50%;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
    }

    .theme-symbol {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 86px;
      color: rgba(246,221,176,.7);
    }

    .theme-body {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 20px;
    }

    .theme-body h3 {
      font-size: 28px;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .theme-body p {
      color: var(--muted);
      line-height: 1.8;
    }

    .enter-line {
      color: var(--gold-light);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      letter-spacing: 0.12em;
    }

    .subhero {
      padding: 72px 0 34px;
      border-bottom: 1px solid var(--line);
    }

    .breadcrumb {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 22px;
    }

    .breadcrumb button {
      color: var(--gold-light);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .subhero h2 {
      font-size: clamp(42px, 6vw, 76px);
      letter-spacing: 0.1em;
      margin-bottom: 18px;
    }

    .subhero p {
      max-width: 780px;
      color: var(--muted);
      line-height: 1.9;
      font-size: 17px;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    .work-card {
      cursor: pointer;
      transition: 0.26s ease;
    }

    .work-card:hover {
      transform: translateY(-7px);
      border-color: rgba(216,180,106,.55);
    }

    .work-image {
      height: 190px;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
    }

    .work-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: 0.35s ease;
    }

    .work-card:hover .work-image img {
      transform: scale(1.06);
    }

    .work-body {
      padding: 18px;
    }

    .work-body h3 {
      font-size: 19px;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .meta {
      color: var(--gold-light);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .work-body p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 28px;
      padding: 56px 0 86px;
      align-items: start;
    }

    .detail-image {
      min-height: 580px;
      border-radius: 34px;
      border: 1px solid rgba(216,180,106,.28);
      background: rgba(255,255,255,.04);
      box-shadow: var(--shadow);
      position: sticky;
      top: 96px;
      overflow: hidden;
    }

    .detail-image img {
      width: 100%;
      height: 100%;
      min-height: 580px;
      object-fit: contain;
      display: block;
    }

    .info-card {
      padding: 34px;
    }

    .detail-title {
      font-size: clamp(32px, 4vw, 56px);
      line-height: 1.2;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 24px 0;
    }

    .meta-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,.045);
    }

    .meta-box small {
      display: block;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .meta-box strong {
      color: var(--gold-light);
      font-weight: 600;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 22px 0;
    }

    .tag {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(216,180,106,.35);
      color: var(--gold-light);
      background: rgba(216,180,106,.08);
      font-size: 13px;
    }

    .intro-text {
      color: #e4dac7;
      line-height: 2.05;
      font-size: 17px;
      margin: 20px 0 26px;
    }

    .curator-note {
      border-left: 3px solid var(--gold);
      padding: 16px 18px;
      color: var(--muted);
      line-height: 1.9;
      background: rgba(216,180,106,.07);
      border-radius: 0 18px 18px 0;
    }

    .footer-actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .site-footer {
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding: 34px 0;
      text-align: center;
      line-height: 1.8;
    }

    @media (max-width: 980px) {
      .hero-grid,
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .theme-grid {
        grid-template-columns: 1fr;
      }

      .works-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .detail-image {
        position: relative;
        top: auto;
        min-height: 360px;
      }

      .detail-image img {
        min-height: 360px;
      }
    }

    @media (max-width: 640px) {
      .topbar-inner {
        height: auto;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        justify-content: flex-start;
      }

      .hero {
        padding-top: 44px;
      }

      .dragon-panel {
        min-height: 360px;
      }

      .works-grid,
      .detail-meta {
        grid-template-columns: 1fr;
      }

      .section-head {
        display: block;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand" onclick="showHome()" style="cursor:pointer;">
        <div class="brand-mark">龍</div>
        <div>龍之形</div>
      </div>
      <nav class="nav">
        <button onclick="showHome()">首頁</button>
        <button onclick="showTheme('jade')">玉中之龍</button>
        <button onclick="showTheme('porcelain')">瓷器之龍</button>
        <button onclick="showTheme('ink')">筆墨之龍</button>
      </nav>
    </div>
  </header>

  <main>
    <section id="homePage" class="page active">
      <div class="hero">
        <div class="container hero-grid">
          <div>
            <div class="eyebrow"><span class="spark"></span> 中國藝術名品展品介紹網頁</div>
            <h1 class="hero-title"><span>龍之形</span><span>器物與筆墨之間</span></h1>
            <p class="lead">
              本展以「龍」為核心意象，從玉器、瓷器與筆墨三種媒材出發，三個主題共十五件作品介紹。
            </p>
            <div class="hero-actions">
              <button class="primary-btn" onclick="scrollToThemes()">進入展覽</button>
              <button class="ghost-btn" onclick="showTheme('jade')">從玉器開始</button>
            </div>
          </div>

          <div class="dragon-panel" aria-label="龍形高級視覺設計">
            <div class="dragon-line"></div>
            <div class="dragon-word">龍</div>
            <div class="seal">策展</div>
          </div>
        </div>
      </div>

      <section id="themeSection" class="section">
        <div class="container">
          <div class="section-head">
            <div>
              <h2 class="section-title">三大主題</h2>
              <p class="section-note">以媒材作為策展分類，讓觀眾從材質、工藝與觀看方式理解龍形如何被轉化。</p>
            </div>
          </div>
          <div class="theme-grid" id="themeCards"></div>
        </div>
      </section>
    </section>

    <section id="themePage" class="page">
      <div class="subhero">
        <div class="container">
          <div class="breadcrumb">
            <button onclick="showHome()">首頁</button><span>/</span><span id="themeBreadcrumb">主題</span>
          </div>
          <h2 id="themeTitle"></h2>
          <p id="themeDescription"></p>
        </div>
      </div>
      <div class="section">
        <div class="container">
          <div class="section-head">
            <div>
              <h2 class="section-title">作品列表</h2>
              <p class="section-note">點選任一作品，即可進入單件作品介紹頁面。</p>
            </div>
          </div>
          <div class="works-grid" id="worksGrid"></div>
        </div>
      </div>
    </section>

    <section id="detailPage" class="page">
      <div class="subhero">
        <div class="container">
          <div class="breadcrumb">
            <button onclick="showHome()">首頁</button><span>/</span>
            <button id="detailThemeLink">主題</button><span>/</span><span id="detailBreadcrumb">作品</span>
          </div>
        </div>
      </div>
      <div class="container detail-layout">
        <div class="detail-image"><img id="detailImg" src="" alt="作品圖片" /></div>
        <article class="info-card">
          <h2 class="detail-title" id="detailTitle"></h2>
          <div class="detail-meta">
            <div class="meta-box"><small>年代</small><strong id="detailEra"></strong></div>
            <div class="meta-box"><small>媒材</small><strong id="detailMaterial"></strong></div>
          </div>
          <div class="tag-row" id="detailTags"></div>
          <p class="intro-text" id="detailIntro"></p>
          <div class="curator-note" id="detailNote"></div>
          <div class="footer-actions">
            <button class="primary-btn" id="backToThemeBtn">回到本主題</button>
            <button class="ghost-btn" onclick="showHome()">回首頁</button>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      龍之形：中國藝術名品策展｜玉器、瓷器、筆墨三大展區<br />
    </div>
  </footer>

  <script>
    const data = {
      jade: {
        id: "jade",
        title: "玉中之龍",
        subtitle: "",
        symbol: "玉",
        description: "在中國藝術的發展中，玉器是最早出現龍形象的重要媒材之一，也是龍文化起源的重要見證。早期的龍並非今日所熟悉的威嚴帝王象徵，而是帶有抽象、神秘的圖騰特徵，寄託著古人對天地、自然與神靈的想像。蜷曲盤旋的龍形被雕刻於玉器之上，不僅展現出早期中國藝術的造型特色，也反映出龍作為神獸的原始面貌。 在中國古代，玉被視為具有靈性與神聖力量的材質，常用於祭祀、祈福與禮儀之中，因此玉器上的龍不只是裝飾，更象徵著天地溝通、神靈崇拜與生命信仰。透過這些古老的玉雕作品，我們得以看見龍如何從遠古圖騰逐漸發展為具有神性意義的文化象徵，也為後世龍在中國藝術中的多元形象奠定了基礎。 ",
        works: [
          {
            id: "jade-1",
            title: "玉豬龍",
            era: "紅山文化晚期",
            material: "玉",
            keywords: ["尺寸：長7.8公分 寬5.6公分 厚2.1-2.6公分"],
            image: "images/1-1.jpg",
            short: "以蜷曲環狀的身軀結合近似豬首的頭部，呈現中國早期龍形尚未完全定型前的神祕樣貌。",
            intro: "紅山文化玉豬龍是中國目前已知最早的龍形玉器之一，出土於新石器時代紅山文化遺址，距今約五千多年，被譽為「中華第一龍」，在中國龍文化的起源研究中具有重要地位。作品整體呈蜷曲環狀，頭部近似豬首，身體細長如蛇，因此又被稱為「玉豬龍」。與後世常見威嚴華麗的龍形象不同，玉豬龍的造型較為抽象簡潔，顯示出早期龍的形象尚未完全定型，仍保留著原始圖騰的神秘特徵，也反映出遠古先民對自然力量與神靈世界的想像。玉豬龍以玉雕刻而成，而玉在中國古代被視為具有靈性與神聖意義的材質，常用於祭祀與禮儀，因此這件作品不僅是一件裝飾性的玉器，更可能具有宗教信仰、祭祀儀式或身份象徵的功能。其造型雖然簡潔，卻具有流暢的線條與完整的輪廓，展現出早期玉雕工藝的成熟技術。作為中國龍文化的早期象徵，玉豬龍不僅展現了龍從原始圖騰到文化神獸的發展起點，也為後世中國藝術中龍的形象奠定了基礎。 ",
            note: "選品原因：選擇玉豬龍作為本展區「玉中之龍」的第一件展品，具有代表龍文化起源的重要意義。相較於後世象徵皇權與威嚴的龍，玉豬龍保留了龍最早期神秘、抽象的圖騰特徵，能讓觀者看見龍形象最初的樣貌。 "

    const homePage = document.getElementById("homePage");
    const themePage = document.getElementById("themePage");
    const detailPage = document.getElementById("detailPage");
    const themeCards = document.getElementById("themeCards");
    const worksGrid = document.getElementById("worksGrid");

    let currentThemeId = "jade";

    function setActivePage(page) {
      [homePage, themePage, detailPage].forEach(p => p.classList.remove("active"));
      page.classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showHome() {
      setActivePage(homePage);
    }

    function scrollToThemes() {
      document.getElementById("themeSection").scrollIntoView({ behavior: "smooth" });
    }

    function showTheme(themeId) {
      currentThemeId = themeId;
      const theme = data[themeId];
      document.getElementById("themeBreadcrumb").textContent = theme.title;
      document.getElementById("themeTitle").textContent = theme.title;
      document.getElementById("themeDescription").textContent = theme.description;
      worksGrid.innerHTML = theme.works.map(work => `
        <article class="work-card" onclick="showDetail('${themeId}', '${work.id}')">
          <div class="work-image"><img src="${work.image}" alt="${work.title}"></div>
          <div class="work-body">
            <div class="meta">${work.era}｜${work.material}</div>
            <h3>${work.title}</h3>
            <p>${work.short}</p>
          </div>
        </article>
      `).join("");
      setActivePage(themePage);
    }

    function showDetail(themeId, workId) {
      currentThemeId = themeId;
      const theme = data[themeId];
      const work = theme.works.find(item => item.id === workId);
      document.getElementById("detailThemeLink").textContent = theme.title;
      document.getElementById("detailThemeLink").onclick = () => showTheme(themeId);
      document.getElementById("detailBreadcrumb").textContent = work.title;
      document.getElementById("detailTitle").textContent = work.title;
      document.getElementById("detailEra").textContent = work.era;
      document.getElementById("detailMaterial").textContent = work.material;
      document.getElementById("detailIntro").textContent = work.intro;
      document.getElementById("detailNote").textContent = work.note;
      document.getElementById("detailImg").src = work.image;
      document.getElementById("detailImg").alt = work.title;
      document.getElementById("detailTags").innerHTML = work.keywords.map(tag => `<span class="tag">${tag}</span>`).join("");
      document.getElementById("backToThemeBtn").onclick = () => showTheme(themeId);
      setActivePage(detailPage);
    }

    function renderThemeCards() {
      themeCards.innerHTML = Object.values(data).map(theme => `
        <article class="theme-card" onclick="showTheme('${theme.id}')">
          <div class="theme-visual">
            <div class="theme-symbol">${theme.symbol}</div>
          </div>
          <div class="theme-body">
            <div>
              <h3>${theme.title}</h3>
              <p>${theme.subtitle}</p>
            </div>
            <div class="enter-line">進入主題 <span>→</span></div>
          </div>
        </article>
      `).join("");
    }

    renderThemeCards();
  </script>
